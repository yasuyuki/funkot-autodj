name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.93"

jobs:
  test:
    name: test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --release
        run: cargo test --workspace --release

  build:
    name: build (${{ matrix.artifact }})
    needs: [test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
          - os: windows-latest
            artifact: windows-x64
          - os: macos-latest
            artifact: macos-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev zip

      # Avoid KyleMayes/install-llvm-action@v2 (still declares Node.js 20; GitHub
      # forces Node 24 and emits a deprecation warning). Install the same LLVM 18
      # win64 package the action would fetch, for bindgen's libclang only.
      - name: Install LLVM (Windows, for bindgen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "18.1.8"
          $installer = Join-Path $env:RUNNER_TEMP "LLVM-$ver-win64.exe"
          $dest = Join-Path $env:RUNNER_TEMP "llvm-$ver"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$ver/LLVM-$ver-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          # NSIS: /D= must be last and unquoted; use a path without spaces.
          Start-Process -FilePath $installer -ArgumentList "/S","/D=$dest" -Wait
          $llvmBin = Join-Path $dest "bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll not found under $llvmBin after LLVM install"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmBin"
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.artifact }}

      - name: cargo build --workspace --release
        run: cargo build --workspace --release

      - name: Package CLI and SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          zip -j "dist/funkot-autodj-${{ matrix.artifact }}.zip" \
            target/release/funkot-autodj
          zip -j "dist/funkot-autodj-sdk-${{ matrix.artifact }}.zip" \
            target/release/libfunkot_core.so \
            target/release/libfunkot_core.a \
            include/funkot.h

      - name: Package CLI and SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "target/release"
          $cli = "dist/cli"
          $sdk = "dist/sdk"
          New-Item -ItemType Directory -Force -Path $cli, $sdk | Out-Null
          Copy-Item "$src/funkot-autodj.exe" $cli/
          Copy-Item "$src/funkot_core.dll" $sdk/
          Copy-Item "include/funkot.h" $sdk/
          foreach ($f in @("funkot_core.dll.lib", "funkot_core.lib")) {
            if (Test-Path "$src/$f") { Copy-Item "$src/$f" $sdk/ }
          }
          Compress-Archive -Path "$cli/*" -DestinationPath "dist/funkot-autodj-${{ matrix.artifact }}.zip"
          Compress-Archive -Path "$sdk/*" -DestinationPath "dist/funkot-autodj-sdk-${{ matrix.artifact }}.zip"
          Remove-Item -Recurse -Force $cli, $sdk

      - name: Package CLI and SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          zip -j "dist/funkot-autodj-${{ matrix.artifact }}.zip" \
            target/release/funkot-autodj
          zip -j "dist/funkot-autodj-sdk-${{ matrix.artifact }}.zip" \
            target/release/libfunkot_core.dylib \
            target/release/libfunkot_core.a \
            include/funkot.h

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Collect zip assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name '*.zip' -exec cp -t release-assets {} +
          ls -la release-assets

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
