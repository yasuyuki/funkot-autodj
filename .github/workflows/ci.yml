name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.93"

jobs:
  test:
    name: test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --release
        run: cargo test --workspace --release

  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
          - os: windows-latest
            artifact: windows-x64
          - os: macos-latest
            artifact: macos-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev

      # Avoid KyleMayes/install-llvm-action@v2 (still declares Node.js 20; GitHub
      # forces Node 24 and emits a deprecation warning). Install the same LLVM 18
      # win64 package the action would fetch, for bindgen's libclang only.
      - name: Install LLVM (Windows, for bindgen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "18.1.8"
          $installer = Join-Path $env:RUNNER_TEMP "LLVM-$ver-win64.exe"
          $dest = Join-Path $env:RUNNER_TEMP "llvm-$ver"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$ver/LLVM-$ver-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          # NSIS: /D= must be last and unquoted; use a path without spaces.
          Start-Process -FilePath $installer -ArgumentList "/S","/D=$dest" -Wait
          $llvmBin = Join-Path $dest "bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll not found under $llvmBin after LLVM install"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmBin"
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.artifact }}

      - name: cargo build --workspace --release
        run: cargo build --workspace --release

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/libfunkot_core.so \
             target/release/libfunkot_core.a \
             target/release/funkot-autodj \
             include/funkot.h \
             dist/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "target/release"
          Copy-Item "$src/funkot_core.dll" dist/
          Copy-Item "$src/funkot-autodj.exe" dist/
          Copy-Item "include/funkot.h" dist/
          foreach ($f in @("funkot_core.dll.lib", "funkot_core.lib")) {
            if (Test-Path "$src/$f") { Copy-Item "$src/$f" dist/ }
          }

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/libfunkot_core.dylib \
             target/release/libfunkot_core.a \
             target/release/funkot-autodj \
             include/funkot.h \
             dist/

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error
