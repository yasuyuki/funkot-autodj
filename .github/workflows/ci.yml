name: CI

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.93"

jobs:
  test:
    name: test (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --release
        run: cargo test --workspace --release

  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
          - os: windows-latest
            artifact: windows-x64
          - os: macos-latest
            artifact: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libclang-dev pkg-config libasound2-dev

      - name: Install LLVM (Windows, for bindgen)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$env:LLVM_PATH\bin"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.artifact }}

      - name: cargo build --workspace --release
        run: cargo build --workspace --release

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/libfunkot_core.so \
             target/release/libfunkot_core.a \
             target/release/funkot-autodj \
             include/funkot.h \
             dist/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "target/release"
          Copy-Item "$src/funkot_core.dll" dist/
          Copy-Item "$src/funkot-autodj.exe" dist/
          Copy-Item "include/funkot.h" dist/
          foreach ($f in @("funkot_core.dll.lib", "funkot_core.lib")) {
            if (Test-Path "$src/$f") { Copy-Item "$src/$f" dist/ }
          }

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/libfunkot_core.dylib \
             target/release/libfunkot_core.a \
             target/release/funkot-autodj \
             include/funkot.h \
             dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error
